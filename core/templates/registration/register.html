<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - App HUB Pro</title>
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .reg-card { background-color: #1f1f1f; padding: 40px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 400px; text-align: center; }
        h2 { color: #00e676; margin-bottom: 25px; letter-spacing: 1px; }
        form p { text-align: left; font-size: 14px; color: #bbb; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 30px; border: none; background: #00e676; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #00c853; transform: translateY(-2px); }
        .footer-links { margin-top: 20px; font-size: 14px; color: #aaa; }
        .footer-links a { color: #00e676; text-decoration: none; }
    </style>
</head>
<body>
    <div class="reg-card">
        <h2>Join App HUB Pro</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Create Account</button>
        </form>
        <div class="footer-links">
            Already have an account? <a href="{% url 'login' %}">Login Here</a> <br><br>
            <a href="{% url 'home' %}">← Back to Home</a>
        </div>
    </div>
</body>
</html>
