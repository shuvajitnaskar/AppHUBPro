{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Hub Pro - Security Check</title>
    
    <link rel="icon" type="image/png" href="{% static 'images/edited-image.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-pink: #ff007b;
            --bg-dark: #000000;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        /* QR Code Container */
        .qr-box {
            background: white;
            padding: 10px;
            border-radius: 20px;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            margin-bottom: 20px;
            transition: 0.3s;
        }
        
        .qr-box img {
            width: 200px;
            height: 200px;
            display: block;
        }

        h2 {
            font-family: 'Orbitron';
            font-size: 20px;
            color: var(--neon-pink);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Follow Button */
        .follow-btn {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
            padding: 15px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(188, 24, 136, 0.5);
        }

        .follow-btn:hover { transform: scale(1.05); }

        /* Enter Website Button (Hidden by default) */
        #enter-btn {
            display: none;
            margin-top: 20px;
            background: var(--neon-blue);
            color: black;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            text-decoration: none;
            font-family: 'Orbitron';
            animation: fadeIn 1s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .note { font-size: 11px; color: #555; margin-top: 15px; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px;">
        <img src="{% static 'images/edited-image.png' %}" style="width: 70px; border-radius: 50%; border: 2px solid var(--neon-blue);">
    </div>

    <h2>Follow to Unlock Website</h2>

    <div class="qr-box">
        <img src="{% static 'images/qr_code.png' %}" alt="Instagram QR Code">
    </div>

    <p style="font-size: 14px; margin-bottom: 20px; color: #aaa;">Scan QR or Click below to follow @shuvajit_naskar</p>

    <a href="https://www.instagram.com/shuvajit_naskar" target="_blank" class="follow-btn" id="follow-link">
        FOLLOW ON INSTAGRAM
    </a>

    <a href="{% url 'home' %}" id="enter-btn">ENTER WEBSPACE →</a>

    <p class="note">Security System: Website unlocks after visiting profile</p>

    <script>
        const followLink = document.getElementById('follow-link');
        const enterBtn = document.getElementById('enter-btn');

        followLink.addEventListener('click', () => {
            // ইউজার ক্লিক করার ৩ সেকেন্ড পর এন্টার বাটন দেখাবে
            setTimeout(() => {
                enterBtn.style.display = 'inline-block';
                followLink.innerText = "THANKS FOR SUPPORTING!";
                followLink.style.opacity = "0.5";
                followLink.style.pointerEvents = "none";
            }, 3000);
        });
    </script>

</body>
</html>
