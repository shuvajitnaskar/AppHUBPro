{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon Upload | AppHUBPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --main-neon: #00d4ff; 
            --main-neon-deep: #0088aa;
            --card-dark: rgba(20, 20, 22, 0.95);
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Main Hexagon Container --- */
        .hex-wrapper {
            position: relative;
            width: 550px;
            height: 650px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Neon Flow Animation on the border */
            background: linear-gradient(45deg, var(--main-neon), transparent, var(--main-neon-deep), transparent);
            background-size: 400% 400%;
            animation: neonFlow 3s ease infinite;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            padding: 4px; /* Border thickness */
            transition: 0.5s;
        }

        /* Full Glow when upload completes */
        .hex-wrapper.glow-complete {
            background: var(--main-neon);
            box-shadow: 0 0 50px var(--main-neon), 0 0 100px var(--main-neon);
            animation: none;
        }

        /* Inner Content Area (The actual form container) */
        .hex-inner {
            width: 100%;
            height: 100%;
            background-color: var(--card-dark);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        @keyframes neonFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Form Elements Inside Hexagon --- */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            color: white;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--main-neon);
            margin: 0 0 20px 0;
            text-align: center;
        }

        .form-content {
            width: 80%; /* Keeps inputs inside the safe zone of hexagon */
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 3px;
            font-family: 'Orbitron';
            letter-spacing: 1px;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: rgba(10, 10, 12, 0.8);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: var(--main-neon);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        /* Custom File Input */
        .file-input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            width: 100%; height: 100%; cursor: pointer;
        }
        .file-btn {
            display: block; width: 100%; padding: 10px;
            background: #121214; border: 1px dashed var(--main-neon);
            color: #888; text-align: center; border-radius: 8px;
            font-size: 11px; font-family: 'Orbitron'; box-sizing: border-box;
            transition: 0.3s;
        }
        .file-input-wrapper:hover .file-btn { background: rgba(0, 212, 255, 0.1); color: white; }

        .upload-btn {
            width: 100%;
            padding: 12px;
            background: var(--main-neon);
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 0 15px var(--main-neon-deep);
        }
        .upload-btn:hover { background: white; box-shadow: 0 0 25px var(--main-neon); }

        .back-link {
            text-align: center;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
            font-size: 10px;
            font-family: 'Orbitron';
            transition: 0.3s;
        }
        .back-link:hover { color: var(--main-neon); }
        .error-msg { color: #ff007b; text-align: center; font-size: 11px; margin-bottom: 10px; font-family: 'Orbitron'; }

        /* --- Fake Loader inside Hexagon --- */
        #uploadProgress {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            background: var(--card-dark);
            z-index: 20;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .percent-text { font-family: 'Orbitron'; font-size: 50px; color: white; text-shadow: 0 0 20px var(--main-neon); margin: 0; }
        .status-text { font-family: 'Orbitron'; font-size: 12px; color: var(--main-neon); letter-spacing: 3px; margin-top: 10px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    </style>
</head>
<body>

    <div class="hex-wrapper" id="hexContainer">
        
        <div class="hex-inner">
            
            <h1>SECURE HUB</h1>
            
            {% if error %}
                <div class="error-msg">⚠️ {{ error }}</div>
            {% endif %}

            <form id="uploadForm" class="form-content" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <label>APP TITLE</label>
                <input type="text" name="title" placeholder="e.g. Modded App v2.0" required>
                
                <label>DESCRIPTION</label>
                <textarea name="description" placeholder="Write features..." rows="2" required></textarea>
                
                <label>FORMAT</label>
                <select name="content_type" required>
                    <option value="app">📱 .APK</option>
                    <option value="photo">🖼️ .JPG / .PNG</option>
                    <option value="video">🎥 .MP4</option>
                </select>
                
                <label>THUMBNAIL</label>
                <div class="file-input-wrapper">
                    <div class="file-btn" id="imgBtnText">Choose Image</div>
                    <input type="file" name="logo" accept="image/*" required onchange="document.getElementById('imgBtnText').innerText = this.files[0].name">
                </div>
                
                <label>MAIN FILE</label>
                <div class="file-input-wrapper">
                    <div class="file-btn" id="fileBtnText">Choose File</div>
                    <input type="file" name="file" required onchange="document.getElementById('fileBtnText').innerText = this.files[0].name">
                </div>
                
                <button type="submit" class="upload-btn">INITIATE UPLOAD</button>
            </form>
            
            <a href="{% url 'home' %}" class="back-link">ABORT & RETURN</a>

            <div id="uploadProgress">
                <h2 class="percent-text" id="progressVal">0%</h2>
                <p class="status-text" id="statusText">UPLOADING DATA...</p>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Theme Sync
            const savedTheme = localStorage.getItem('selectedTheme') || '#00d4ff';
            const savedThemeDeep = localStorage.getItem('selectedThemeDeep') || '#0088aa';
            document.documentElement.style.setProperty('--main-neon', savedTheme);
            document.documentElement.style.setProperty('--main-neon-deep', savedThemeDeep);

            // Upload Animation Logic
            const form = document.getElementById('uploadForm');
            const progressOverlay = document.getElementById('uploadProgress');
            const progressVal = document.getElementById('progressVal');
            const statusText = document.getElementById('statusText');
            const hexContainer = document.getElementById('hexContainer');

            form.addEventListener('submit', function(e) {
                e.preventDefault(); // Stop normal submission instantly

                // Show the progress screen over the form
                progressOverlay.style.display = 'flex';
                
                let percent = 0;
                
                // Simulate fake upload progress
                let interval = setInterval(() => {
                    percent += Math.floor(Math.random() * 15) + 5; 
                    
                    if(percent >= 50 && percent < 80) {
                        statusText.innerText = "ENCRYPTING PACKAGES...";
                    } else if (percent >= 80) {
                        statusText.innerText = "FINALIZING...";
                    }

                    if(percent >= 100) {
                        percent = 100;
                        clearInterval(interval);
                        progressVal.innerText = "100%";
                        statusText.innerText = "UPLOAD COMPLETE!";
                        statusText.style.color = "white"; 
                        
                        // হেক্সাগন ফুল গ্লো করবে (Full Glow Effect)
                        hexContainer.classList.add('glow-complete');
                        
                        // Actually submit the form to Django after 1.5 seconds of glowing
                        setTimeout(() => {
                            form.submit();
                        }, 1500);
                    } else {
                        progressVal.innerText = percent + "%";
                    }
                }, 300); // Speed of the fake loader
            });
        });
    </script>
</body>
</html>
