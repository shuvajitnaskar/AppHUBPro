{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagon Upload | AppHUBPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --main-neon: #00d4ff; 
            --main-neon-deep: #0088aa;
            --card-dark: rgba(20, 20, 22, 0.95);
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Prevent scrolling from watermarks */
            position: relative;
        }

        /* --- Dense Watermark Background --- */
        .watermark-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: 1; /* Behind everything */
            pointer-events: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-content: space-around;
            opacity: 0.05; /* Subtle */
        }
        
        .watermark-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--main-neon);
            transform: rotate(-30deg);
            padding: 20px;
            white-space: nowrap;
        }

        /* --- Elongated Hexagon Container (Cyber Shield) --- */
        .hex-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px; 
            height: 720px; 
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, var(--main-neon), transparent, var(--main-neon-deep), transparent);
            background-size: 400% 400%;
            animation: neonFlow 3s ease infinite;
            clip-path: polygon(50% 0%, 100% 8%, 100% 92%, 50% 100%, 0% 92%, 0% 8%);
            padding: 4px; 
            transition: 0.5s;
            z-index: 10; /* Above watermarks */
        }

        .hex-wrapper.glow-complete {
            background: var(--main-neon);
            box-shadow: 0 0 50px var(--main-neon), 0 0 100px var(--main-neon);
            animation: none;
        }

        /* Inner Content Area */
        .hex-inner {
            width: 100%;
            height: 100%;
            background-color: var(--card-dark);
            clip-path: polygon(50% 0%, 100% 8%, 100% 92%, 50% 100%, 0% 92%, 0% 8%);
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            padding: 70px 30px 40px 30px; 
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        @keyframes neonFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Form Elements Inside Hexagon --- */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: white;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--main-neon);
            margin: 0 0 20px 0;
            text-align: center;
        }

        .form-content {
            width: 95%; 
            display: flex;
            flex-direction: column;
            overflow-y: auto; 
            max-height: 100%;
            padding-right: 5px;
        }

        .form-content::-webkit-scrollbar { display: none; }
        .form-content { -ms-overflow-style: none; scrollbar-width: none; }

        label {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 5px;
            font-family: 'Orbitron';
            letter-spacing: 1px;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: rgba(10, 10, 12, 0.8);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: var(--main-neon);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        /* Custom File Input */
        .file-input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            width: 100%; height: 100%; cursor: pointer;
        }
        .file-btn {
            display: block; width: 100%; padding: 12px;
            background: #121214; border: 1px dashed var(--main-neon);
            color: #888; text-align: center; border-radius: 8px;
            font-size: 12px; font-family: 'Orbitron'; box-sizing: border-box;
            transition: 0.3s;
        }
        .file-input-wrapper:hover .file-btn { background: rgba(0, 212, 255, 0.1); color: white; }

        .upload-btn {
            width: 100%;
            padding: 15px;
            background: var(--main-neon);
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 0 15px var(--main-neon-deep);
        }
        .upload-btn:hover { background: white; box-shadow: 0 0 25px var(--main-neon); }

        .back-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 11px;
            font-family: 'Orbitron';
            transition: 0.3s;
        }
        .back-link:hover { color: var(--main-neon); }
        .error-msg { color: #ff007b; text-align: center; font-size: 12px; margin-bottom: 15px; font-family: 'Orbitron'; }

        /* --- Fake Loader inside Hexagon --- */
        #uploadProgress {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            background: var(--card-dark);
            z-index: 20;
            clip-path: polygon(50% 0%, 100% 8%, 100% 92%, 50% 100%, 0% 92%, 0% 8%);
        }
        .percent-text { font-family: 'Orbitron'; font-size: 50px; color: white; text-shadow: 0 0 20px var(--main-neon); margin: 0; }
        .status-text { font-family: 'Orbitron'; font-size: 12px; color: var(--main-neon); letter-spacing: 3px; margin-top: 10px; animation: blink 1s infinite; text-align: center;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    </style>
</head>
<body>

    <div class="watermark-container" id="watermarkContainer">
        </div>

    <div class="hex-wrapper" id="hexContainer">
        
        <div class="hex-inner">
            
            <h1>SECURE HUB</h1>
            
            {% if error %}
                <div class="error-msg">⚠️ {{ error }}</div>
            {% endif %}

            <form id="uploadForm" class="form-content" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <label>APP TITLE</label>
                <input type="text" name="title" placeholder="e.g. Modded App v2.0" required>
                
                <label>DESCRIPTION</label>
                <textarea name="description" placeholder="Write features..." rows="2" required></textarea>
                
                <label>FORMAT</label>
                <select name="content_type" required>
                    <option value="app">📱 .APK</option>
                    <option value="photo">🖼️ .JPG / .PNG</option>
                    <option value="video">🎥 .MP4</option>
                </select>
                
                <label>THUMBNAIL</label>
                <div class="file-input-wrapper">
                    <div class="file-btn" id="imgBtnText">Choose Image</div>
                    <input type="file" name="logo" accept="image/*" required onchange="document.getElementById('imgBtnText').innerText = this.files[0].name">
                </div>
                
                <label>MAIN FILE</label>
                <div class="file-input-wrapper">
                    <div class="file-btn" id="fileBtnText">Choose File</div>
                    <input type="file" name="file" required onchange="document.getElementById('fileBtnText').innerText = this.files[0].name">
                </div>
                
                <button type="button" class="upload-btn" id="startUploadBtn">INITIATE UPLOAD</button>

                <a href="{% url 'home' %}" class="back-link">ABORT & RETURN</a>
            </form>

            <div id="uploadProgress">
                <h2 class="percent-text" id="progressVal">0%</h2>
                <p class="status-text" id="statusText">UPLOADING DATA...</p>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Theme Sync
            const savedTheme = localStorage.getItem('selectedTheme') || '#00d4ff';
            const savedThemeDeep = localStorage.getItem('selectedThemeDeep') || '#0088aa';
            document.documentElement.style.setProperty('--main-neon', savedTheme);
            document.documentElement.style.setProperty('--main-neon-deep', savedThemeDeep);

            // Populate Watermarks
            const wmContainer = document.getElementById('watermarkContainer');
            const numWatermarks = 150; 
            const watermarkHTML = '<div class="watermark-text">Shuvajit Naskar</div>';
            wmContainer.innerHTML = watermarkHTML.repeat(numWatermarks);

            // ----------------------------------------------------
            // REAL-TIME UPLOAD PROGRESS LOGIC (AJAX)
            // ----------------------------------------------------
            const form = document.getElementById('uploadForm');
            const startBtn = document.getElementById('startUploadBtn');
            const progressOverlay = document.getElementById('uploadProgress');
            const progressVal = document.getElementById('progressVal');
            const statusText = document.getElementById('statusText');
            const hexContainer = document.getElementById('hexContainer');

            startBtn.addEventListener('click', function() {
                // 1. Basic validation check before starting upload
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                // 2. Show the progress screen over the form
                progressOverlay.style.display = 'flex';
                statusText.innerText = "STARTING UPLOAD...";
                
                // 3. Create AJAX request
                const xhr = new XMLHttpRequest();
                const formData = new FormData(form);

                // 4. Track Real Progress Event
                xhr.upload.addEventListener("progress", function(e) {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        
                        progressVal.innerText = percentComplete + "%";

                        if (percentComplete < 50) {
                            statusText.innerText = "UPLOADING DATA...";
                        } else if (percentComplete >= 50 && percentComplete < 99) {
                            statusText.innerText = "ENCRYPTING PACKAGES...";
                        } else if (percentComplete === 100) {
                            statusText.innerText = "FINALIZING...";
                        }
                    }
                });

                // 5. Handle successful upload
                xhr.addEventListener("load", function() {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        progressVal.innerText = "100%";
                        statusText.innerText = "UPLOAD COMPLETE!";
                        statusText.style.color = "white"; 
                        
                        // Full Glow Effect
                        hexContainer.classList.add('glow-complete');
                        
                        // Redirect to home page after success
                        setTimeout(() => {
                            window.location.href = "{% url 'home' %}"; 
                        }, 2000);
                    } else {
                        // Handle server errors
                        progressVal.innerText = "ERROR";
                        statusText.innerText = "UPLOAD FAILED. TRY AGAIN.";
                        statusText.style.color = "red";
                        setTimeout(() => { progressOverlay.style.display = 'none'; }, 3000);
                    }
                });

                // Handle network errors
                xhr.addEventListener("error", function() {
                    progressVal.innerText = "ERROR";
                    statusText.innerText = "NETWORK ERROR.";
                    statusText.style.color = "red";
                    setTimeout(() => { progressOverlay.style.display = 'none'; }, 3000);
                });

                // 6. Send Data to Server
                xhr.open("POST", form.action || window.location.href, true);
                
                // Important: We need to send the CSRF token correctly if using AJAX
                // Django usually requires this header for AJAX POST requests
                const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
                xhr.setRequestHeader("X-CSRFToken", csrfToken);
                
                xhr.send(formData);
            });
        });
    </script>
</body>
</html>
