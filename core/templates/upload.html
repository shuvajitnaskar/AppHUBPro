{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Content | AppHUBPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --main-neon: #00d4ff; 
            --card-dark: rgba(20, 20, 22, 0.95);
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .upload-container {
            background: var(--card-dark);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            font-size: 28px;
            color: white;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--main-neon);
            margin-bottom: 30px;
        }

        label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
            display: block;
            font-family: 'Orbitron';
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #151517;
            color: white;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: var(--main-neon);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        input[type="file"] {
            margin-bottom: 20px;
            color: #bbb;
            font-size: 12px;
        }

        .upload-btn {
            width: 100%;
            padding: 15px;
            background: var(--main-neon);
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .upload-btn:hover {
            background: white;
            box-shadow: 0 0 20px var(--main-neon);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 12px;
            font-family: 'Orbitron';
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--main-neon);
        }

        .error-msg {
            color: #ff007b;
            text-align: center;
            font-size: 12px;
            margin-bottom: 15px;
            font-family: 'Orbitron';
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <h1>☁️ UPLOAD HUB</h1>
        
        {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label>CONTENT TITLE</label>
            <input type="text" name="title" placeholder="Enter app or content name" required>
            
            <label>DESCRIPTION</label>
            <textarea name="description" placeholder="Write a short description about this content..." rows="4" required></textarea>
            
            <label>CONTENT TYPE</label>
            <select name="content_type" required>
                <option value="app">📱 Android App (.apk)</option>
                <option value="photo">🖼️ Photo / Wallpaper</option>
                <option value="video">🎥 Video File</option>
            </select>
            
            <label>UPLOAD LOGO / THUMBNAIL</label>
            <input type="file" name="logo" accept="image/*" required>
            
            <label>UPLOAD MAIN FILE (.APK, .JPG, .MP4)</label>
            <input type="file" name="file" required>
            
            <button type="submit" class="upload-btn">PUBLISH SECURELY</button>
        </form>

        <a href="{% url 'home' %}" class="back-link">← BACK TO HOME</a>
    </div>

    <script>
        // হোম পেজ থেকে ইউজারের সিলেক্ট করা নিয়ন কালার এখানেও সিঙ্ক হবে
        document.addEventListener("DOMContentLoaded", function() {
            const savedTheme = localStorage.getItem('selectedTheme') || '#00d4ff';
            document.documentElement.style.setProperty('--main-neon', savedTheme);
        });
    </script>
</body>
</html>
