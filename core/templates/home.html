<div class="grid-container">
    {% for item in contents %}
    <div class="card">
        <span class="badge">{{ item.get_content_type_display }}</span>
        <h3>{{ item.title }}</h3>
        
        <div style="font-size: 12px; color: #ff4081; margin-bottom: 8px;">
            By: {{ item.uploaded_by.username }} 
            {% if item.uploaded_by.email %}| {{ item.uploaded_by.email }}{% endif %}
        </div>

        <p>{{ item.description|default:"No description available." }}</p>
        
        <div class="app-rating-box">
             </div>

        <div class="btn-group">
            <a href="{{ item.file.url }}" class="preview-btn" target="_blank">Preview / Open</a>
            <a href="{{ item.file.url }}" class="download-btn" download="{{ item.title }}">Download File</a>
        </div>
    </div>
    {% endfor %}
</div>
